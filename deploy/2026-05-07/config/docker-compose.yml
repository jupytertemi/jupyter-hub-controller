services:
  emqx:
    container_name: emqx
    hostname: emqx
    image: emqx/emqx:latest
    pull_policy: never
    restart: always
    ports:
    - 1883:1883
    - 18083:18083
    environment:
    - EMQX_DASHBOARD__DEFAULT_USERNAME=admin
    - TZ=${TZ:-UTC}
    - EMQX_DASHBOARD__DEFAULT_PASSWORD=${MQTT_PASSWORD}
    healthcheck:
      test:
      - CMD
      - /opt/emqx/bin/emqx
      - ctl
      - status
      interval: 60s
      timeout: 25s
      retries: 5
    volumes:
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
  emqx_setting:
    container_name: emqx_setting
    image: ${IMAGE_EMQX_SETTING:-ghcr.io/jupyter-hub/emqx_setting:latest}
    pull_policy: never
    depends_on:
      emqx:
        condition: service_healthy
    restart: on-failure
    links:
    - emqx
    environment:
    - MQTT_PASSWORD=${MQTT_PASSWORD}
    - TZ=${TZ:-UTC}
    - MQTT_CONTROLLER_PASSWORD=${MQTT_CONTROLLER_PASSWORD}
    - MQTT_HASS_PASSWORD=${MQTT_HASS_PASSWORD}
    - MQTT_FRIGATE_PASSWORD=${MQTT_FRIGATE_PASSWORD}
    - MQTT_AI_CONTROLLER_PASSWORD=${MQTT_AI_CONTROLLER_PASSWORD}
    - MQTT_RING_CAMERA_PASSWORD=${MQTT_RING_CAMERA_PASSWORD}
    volumes:
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
  frigate:
    container_name: frigate
    hostname: frigate
    privileged: true
    restart: always
    mem_limit: 3G
    image: ${IMAGE_FRIGATE:-ghcr.io/jupyter-hub/frigate:stable-rk}
    pull_policy: never
    shm_size: 512mb
    volumes:
    - /etc/localtime:/etc/localtime:ro
    - ./frigate/config:/config
    - ./frigate/storage:/media/frigate
    - type: tmpfs
      target: /tmp/cache
      tmpfs:
        size: 1000000000
    - /etc/timezone:/etc/timezone:ro
    ports:
    - 8555:8555/tcp
    - 8555:8555/udp
    - 28554:8554
    - 5000:5000
    - 8971:8971
    security_opt:
    - apparmor=unconfined
    - systempaths=unconfined
    devices:
    - /dev/dri
    - /dev/dma_heap
    - /dev/rga
    - /dev/mpp_service
    extra_hosts:
    - host.docker.internal:host-gateway
    environment:
    - TZ=${TZ:-UTC}
  redis:
    container_name: redis
    image: redis:latest
    pull_policy: never
    restart: always
    ports:
    - 6379:6379
    volumes:
    - redis_data:/data
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    command: redis-server --appendonly yes
    environment:
    - TZ=${TZ:-UTC}
  postgres:
    container_name: postgres
    hostname: postgres
    image: pgvector/pgvector:pg17
    pull_policy: never
    restart: always
    environment:
    - POSTGRES_USER=postgres
    - TZ=${TZ:-UTC}
    - POSTGRES_PASSWORD=${DB_PASSWORD}
    - POSTGRES_DB=hub_controller
    volumes:
    - postgres-vlm:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready --username=$$POSTGRES_USER && psql --username=$$POSTGRES_USER
        --list
      timeout: 10s
      retries: 20
    ports:
    - 5433:5432
  jupyter_homeassistant:
    container_name: jupyter_homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    pull_policy: never
    volumes:
    - ./hass/config:/config
    - ./hass/custom_components/meross_lan:/config/custom_components/meross_lan
    - /run/dbus:/run/dbus:ro
    - /etc/hostname:/etc/hostname:ro
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    - /usr/share/zoneinfo:/usr/share/zoneinfo:ro
    restart: on-failure
    privileged: true
    network_mode: host
    entrypoint:
    - /bin/bash
    - -c
    command:
    - "HOST_NAME=$$(cat /etc/hostname | tr -d '[:space:]')\nNEW_URL=\"http://$${HOST_NAME}.local:8123\"\
      \nHA_CONFIG=\"/config/configuration.yaml\"\n\necho \"Setting HA URL to: $$NEW_URL\"\
      \n\nif [ -f \"$$HA_CONFIG\" ]; then\n    sed -i '/^homeassistant:/,/^[a-z]/{\
      \ /^homeassistant:/d; /internal_url:/d; /external_url:/d }' \"$$HA_CONFIG\"\n\
      fi\n\nprintf 'homeassistant:\\n  internal_url: \"%s\"\\n  external_url: \"%s\"\
      \\n\\n' \"$$NEW_URL\" \"$$NEW_URL\" > /tmp/ha_url_block.yaml\n\nif [ -f \"$$HA_CONFIG\"\
      \ ]; then\n    cat \"$$HA_CONFIG\" >> /tmp/ha_url_block.yaml\nfi\nmv /tmp/ha_url_block.yaml\
      \ \"$$HA_CONFIG\"\n\necho \"Done. Starting Home Assistant...\"\nexec /init\n"
    healthcheck:
      test: curl --fail http://localhost:8123/ || exit 1
    environment:
    - TZ=${TZ:-UTC}
  hass_setting:
    container_name: hass_setting
    image: ${IMAGE_HASS_SETTING:-ghcr.io/jupyter-hub/hass_setting:latest}
    pull_policy: never
    depends_on:
      jupyter_homeassistant:
        condition: service_healthy
    restart: on-failure
    environment:
    - HASS_PASSWORD=${HASS_PASSWORD}
    - TZ=${TZ:-UTC}
    - MQTT_HASS_PASSWORD=${MQTT_HASS_PASSWORD}
    extra_hosts:
    - host.docker.internal:host-gateway
    volumes:
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
  event_listener:
    image: ${IMAGE_EVENT_LISTENER:-jupytertemi/event_listener:1.1.0}
    pull_policy: never
    container_name: event_listener
    stdin_open: true
    tty: true
    volumes:
    - ./credentials/:/usr/src/app/credentials/
    - ./.env:/jupyter-hub/.env
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    links:
    - frigate
    - postgres
    - emqx
    restart: unless-stopped
    environment:
    - MQTT_HOST=emqx
    - TZ=${TZ:-UTC}
    - MQTT_PORT=1883
    - MQTT_USERNAME=ai_controller
    - MQTT_PASSWORD=${MQTT_AI_CONTROLLER_PASSWORD}
    - HUB_ENV_PATH=/jupyter-hub/.env
    - HUB_IOT_CONFIG_PATH=/usr/src/app/credentials/iot_credentials.json
    - ENDPOINT=${IOT_ENDPOINT}
    - DEVICE_NAME=${DEVICE_NAME}
    - SUBCRIBE_MQTT_TOPIC=/events
    - BROKER_HOST=emqx
    - BROKER_PORT=1883
    - DB_NAME=hub_controller
    - DB_HOST=postgres
    - DB_USER=${DB_USERNAME}
    - DB_PASSWORD=${DB_PASSWORD}
    - DB_PORT=5432
    - ALARM_ACTIVE_MQTT_TOPIC=/event_alarm_active
    - ENTRYDOOR_DEDUP_SECONDS=10
    depends_on:
      emqx:
        condition: service_healthy
  face_recognition:
    image: ${IMAGE_FACE_RECOGNITION:-jupytertemi/pilot_face_recognition_ai:dev}
    pull_policy: never
    labels:
      com.watchdog.monitor: 'true'
      com.watchdog.description: Face detection and recognition service
      com.watchdog.retention.images: '14'
      com.watchdog.retention.logs: '7'
      com.watchdog.retention.db: '30'
    container_name: face_recognition
    volumes:
    - .:/jupyter-hub
    - ./frigate/config:/config
    - ./frigate/storage:/media/frigate
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    - /dev:/dev
    - ${RKNN_LIB_PATH:-/usr/lib/librknnrt.so}:${RKNN_LIB_PATH:-/usr/lib/librknnrt.so}
    - ./pilot_face_recognition_ai/constants.py:/usr/src/app/constants.py:ro
    links:
    - frigate
    - emqx
    - postgres
    restart: on-failure
    tty: true
    environment:
    - ADAPTIVE_CONFIDENT_LOW=0.45
    - TZ=${TZ:-UTC}
    - ADAPTIVE_POSSIBLE_LOW=0.40
    - ADAPTIVE_CONFIDENT_HIGH=0.30
    - ADAPTIVE_POSSIBLE_HIGH=0.25
    - HUB_IOT_CONFIG_PATH=/jupyter-hub/iot_credentials.json
    - BROKER_HOST=emqx
    - BROKER_PORT=1883
    - MQTT_USERNAME=ai_controller
    - MQTT_PASSWORD=${MQTT_AI_CONTROLLER_PASSWORD}
    - FRIGATE_SERVER_ADDRESS=http://frigate:5000
    - FRIGATE_DB_PATH=/config/frigate.db
    - EVENTS_DB_PATH=/config/events.db
    - CLIPS_PATH=/media/frigate/clips/
    - RECORDINGS_PATH=/media/frigate/recordings/
    - EVENTS_DB=${DB_NAME}
    - DB_HOST=postgres
    - DB_USER=${DB_USERNAME}
    - DB_PASSWORD=${DB_PASSWORD}
    - DB_PORT=5432
    - USE_ENLIGHTENGAN=false
    - USE_MINIMAL_ENHANCER=true
    - SAVE_DEBUG_IMAGES=false
    - USE_RKNN=false
    - RKNN_MODEL_PATH=/usr/src/app/EnlightenGAN-master/checkpoints/enlightening/enlightengan.rknn
    - MQTT_HASS_USERNAME=hass
    - MQTT_HASS_PASSWORD=${MQTT_HASS_PASSWORD}
    depends_on:
      emqx:
        condition: service_healthy
      frigate:
        condition: service_started
      postgres:
        condition: service_healthy
    privileged: true
    devices:
    - /dev/dri:/dev/dri
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 1536M
        reservations:
          memory: 128M
  face_training:
    container_name: face_training
    image: ${IMAGE_FACE_TRAINING:-jupytertemi/pilot_face_train_ai:dev}
    pull_policy: never
    stdin_open: true
    command: python main.py
    environment:
    - DB_HOST=postgres
    - TZ=${TZ:-UTC}
    - DB_USER=${DB_USERNAME}
    - DB_PASSWORD=${DB_PASSWORD}
    - DB_PORT=5432
    - EVENTS_DB=${DB_NAME}
    - FLASK_ENV=production
    - PERSON_DATA_PATH=/usr/src/app/person_data.json
    - RESULT_PATH=/usr/src/app/result.txt
    - TRAINING_VIDEO_PATH=/usr/src/app/media/training_video.mp4
    volumes:
    - ./pilot_face_train_ai/person_data.json:/usr/src/app/person_data.json
    - ./pilot_face_train_ai/result.txt:/usr/src/app/result.txt
    - ./pilot_face_train_ai/media:/usr/src/app/media
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    - /dev:/dev
    - ${RKNN_LIB_PATH:-/usr/lib/librknnrt.so}:${RKNN_LIB_PATH:-/usr/lib/librknnrt.so}
    links:
    - frigate
    - emqx
    - postgres
    restart: on-failure
    tty: true
    depends_on:
      postgres:
        condition: service_healthy
    privileged: true
    devices:
    - /dev/dri:/dev/dri
    - /dev:/dev
  number_plate_detection:
    image: ${IMAGE_NUMBER_PLATE_DETECTION:-jupytertemi/pilot_vehicle_ai:dev}
    pull_policy: never
    container_name: number_plate_detection
    healthcheck:
      test:
      - CMD-SHELL
      - cat /proc/1/cmdline 2>/dev/null | tr '\0' ' ' | grep -q python || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
    - ./frigate/config:/config
    - ./frigate/storage:/media/frigate
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    - /dev/rknn-0:/dev/rknn-0
    - /dev/rknpu0:/dev/rknpu0
    - /dev/dri:/dev/dri
    - /dev:/dev
    - ${RKNN_LIB_PATH:-/usr/lib/librknnrt.so}:${RKNN_LIB_PATH:-/usr/lib/librknnrt.so}
    - ./pilot_vehicle_ai/constants.py:/usr/src/app/constants.py:ro
    links:
    - frigate
    - emqx
    - postgres
    restart: on-failure
    tty: true
    environment:
    - BROKER_HOST=emqx
    - TZ=${TZ:-UTC}
    - BROKER_PORT=1883
    - MQTT_USERNAME=ai_controller
    - MQTT_PASSWORD=${MQTT_AI_CONTROLLER_PASSWORD}
    - FRIGATE_SERVER_ADDRESS=http://frigate:5000
    - FRIGATE_DB_PATH=/config/frigate.db
    - EVENTS_DB_PATH=/config/events.db
    - CLIPS_PATH=/media/frigate/clips/
    - RECORDINGS_PATH=/media/frigate/recordings/
    - DB_NAME=${DB_NAME}
    - HUB_DB_HOST=postgres
    - DB_USER=${DB_USERNAME}
    - DB_PASSWORD=${DB_PASSWORD}
    - DB_PORT=5432
    - PADDLE_NUM_THREADS=1
    - OMP_NUM_THREADS=1
    - FLAGS_allocator_strategy=naive_best_fit
    - FLAGS_conv_workspace_size_limit=256
    - FLAGS_eager_delete_tensor_gb=0.0
    - FLAGS_memory_fraction_of_eager_deletion=0.5
    # --- Phase 2 (2026-05-02): per-camera vehicle calibration gates ---
    - VEHICLE_CALIB_GATES_ENABLED=${VEHICLE_CALIB_GATES_ENABLED:-true}
    - HUB_API_BASE=${HUB_API_BASE:-http://haproxy-service}
    - HUB_BASIC_AUTH=${HUB_BASIC_AUTH:-}
    depends_on:
      emqx:
        condition: service_healthy
      frigate:
        condition: service_started
      postgres:
        condition: service_healthy
    privileged: true
    devices:
    - /dev/dri:/dev/dri
    - /dev:/dev
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 768M
  jupyter_voice_ai:
    image: ${IMAGE_JUPYTER_VOICE_AI:-jupytertemi/jupyter_voice_ai:1.0.1}
    pull_policy: never
    container_name: jupyter_voice_ai
    hostname: jupyter_voice_ai
    env_file: .env
    volumes:
    - /etc/timezone:/etc/timezone:ro
    - /etc/localtime:/etc/localtime:ro
    - /dev/snd:/dev/snd
    - ./alarm_audio:/shared/alarm_audio
    - ./voice_ai_prompts/prompt.txt:/app/prompt.txt:ro
    - ./voice_ai_prompts/prompt_text.txt:/app/prompt_text.txt:ro
    - ./voice_ai_data:/app/data
    ports:
    - 8002:8002
    restart: on-failure
    links:
    - frigate
    - emqx
    - postgres
    environment:
    - DB_NAME=${DB_NAME}
    - TZ=${TZ:-UTC}
    - DB_HOST=postgres
    - DB_USER=${DB_USERNAME}
    - DB_PASSWORD=${DB_PASSWORD}
    - DB_PORT=5432
    - PORT=8002
    - MQTT_HOST=emqx
    - MQTT_PORT=1883
    - MQTT_USERNAME=ai_controller
    - MQTT_PASSWORD=${MQTT_AI_CONTROLLER_PASSWORD}
    - MQTT_TOPIC=/events_alarm
    tty: true
    privileged: true
    depends_on:
      emqx:
        condition: service_healthy
      postgres:
        condition: service_healthy
  sound_detection:
    image: ${IMAGE_SOUND_DETECTION:-jupytertemi/pilot_unusual_sounds_ai:dev}
    pull_policy: never
    container_name: sound_detection
    environment:
    - BROKER_HOST=emqx
    - BROKER_PORT=1883
    - MQTT_USERNAME=ai_controller
    - MQTT_PASSWORD=${MQTT_AI_CONTROLLER_PASSWORD}
    - MQTT_TOPIC=${MQTT_TOPIC:-frigate/events}
    - SOUND_REPUBLISH_TOPIC=${SOUND_REPUBLISH_TOPIC:-sound_detection/detections}
    - EVENTS_DB=${DB_NAME}
    - DB_HOST=postgres
    - DB_USER=${DB_USERNAME}
    - DB_PASSWORD=${DB_PASSWORD}
    - DB_PORT=5432
    - AUDIO_STORAGE_PATH=/media/frigate/recordings/audio
    - TZ=${TIMEZONE:-${TZ:-UTC}}
    - MQTT_HASS_USERNAME=hass
    - MQTT_HASS_PASSWORD=${MQTT_HASS_PASSWORD}
    - AUDIO_SERVER_HOST=audio_server
    - AUDIO_SERVER_PORT=5555
    - SOUND_MODEL=yamnet
    volumes:
    - ./frigate/config:/config
    - ./frigate/storage:/media/frigate
    - /etc/timezone:/etc/timezone:ro
    - /etc/localtime:/etc/localtime:ro
    - ./pilot_unusual_sounds_ai/constants.py:/usr/src/app/constants.py:ro
    depends_on:
      emqx:
        condition: service_healthy
      postgres:
        condition: service_healthy
      audio_server:
        condition: service_started
    links:
    - frigate
    - emqx
    - postgres
    - audio_server
    restart: on-failure
    tty: true
    privileged: true
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 256M
        reservations:
          cpus: '1.0'
          memory: 64M
  loiter_detection:
    image: ${IMAGE_LOITER_DETECTION:-jupytertemi/loiterai:dev}
    pull_policy: never
    container_name: loiter_detection
    restart: unless-stopped
    tty: true
    environment:
    - BROKER_HOST=emqx
    - BROKER_PORT=1883
    - MQTT_USER=ai_controller
    - MQTT_PASS=${MQTT_AI_CONTROLLER_PASSWORD}
    - FRIGATE_URL=http://frigate:5000
    - DB_HOST=postgres
    - DB_PORT=5432
    - DB_NAME=${DB_NAME:-hub_controller}
    - DB_USER=${DB_USERNAME:-postgres}
    - DB_PASS=${DB_PASSWORD}
    - MEDIA_PATH=/media/frigate/clips
    - TZ=${TIMEZONE:-${TZ:-UTC}}
    - IS_ENABLED=${IS_ENABLED:-true}
    - CAMERA_NAME=${CAMERA_NAME:-}
    volumes:
    - ./frigate/storage:/media/frigate
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    - ./loiterai/config.py:/usr/src/app/config.py:ro
    depends_on:
      emqx:
        condition: service_healthy
      postgres:
        condition: service_healthy
      frigate:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
  suggested_faces:
    image: ${IMAGE_SUGGESTED_FACES:-jupytertemi/pilot_suggested_faces_ai:dev}
    pull_policy: never
    container_name: suggested_faces
    volumes:
    - ./frigate/config:/config
    - ./frigate/storage:/media/frigate
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    - /dev:/dev
    - ${RKNN_LIB_PATH:-/usr/lib/librknnrt.so}:${RKNN_LIB_PATH:-/usr/lib/librknnrt.so}
    links:
    - frigate
    - emqx
    - postgres
    restart: on-failure
    tty: true
    environment:
    - BROKER_HOST=emqx
    - TZ=${TZ:-UTC}
    - BROKER_PORT=1883
    - MQTT_USERNAME=ai_controller
    - MQTT_PASSWORD=${MQTT_AI_CONTROLLER_PASSWORD}
    - FRIGATE_SERVER_ADDRESS=http://frigate:5000
    - FRIGATE_DB_PATH=/config/frigate.db
    - EVENTS_DB_PATH=/config/events.db
    - CLIPS_PATH=/media/frigate/clips/
    - RECORDINGS_PATH=/media/frigate/recordings/
    - EVENTS_DB=${DB_NAME}
    - DB_HOST=postgres
    - DB_USER=${DB_USERNAME}
    - DB_PASSWORD=${DB_PASSWORD}
    - DB_PORT=5432
    - DB_MIN_CONNECTIONS=1
    - DB_MAX_CONNECTIONS=10
    - APP_DEBUG=true
    - APP_PORT=5008
    - APP_HOST=0.0.0.0
    - USE_DARK_SKIN_ENHANCEMENT=true
    - USE_BACKLIT_DETECTION=true
    - USE_MULTI_SCALE_DETECTION=true
    - ENHANCE_FOR_EMBEDDING=true
    - DEBUG_ENHANCEMENTS=true
    - LD_LIBRARY_PATH=/usr/lib:/usr/lib/aarch64-linux-gnu
    - RKNN_LOG_LEVEL=debug
    - ENABLE_SCHEDULER=true
    - SCHEDULE_TYPE=daily
    - SCHEDULE_TIME=05:00
    - PROCESSING_LOCK_TIMEOUT=600
    - BOOTSTRAP_MODE=false
    depends_on:
      emqx:
        condition: service_healthy
      frigate:
        condition: service_started
      postgres:
        condition: service_healthy
    privileged: true
    devices:
    - /dev/dri:/dev/dri
    - /dev:/dev
    security_opt:
    - apparmor:unconfined
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 768M
  parcel_detection:
    image: ${IMAGE_PARCEL_DETECTION:-jupytertemi/pilot_parcel_theft_ai:dev}
    pull_policy: never
    container_name: parcel_detection
    restart: on-failure
    privileged: true
    devices:
    - /dev/mpp_service:/dev/mpp_service
    - /dev/dri:/dev/dri
    - /dev/dma_heap:/dev/dma_heap
    environment:
    - FRIGATE_SERVER_ADDRESS=http://frigate:5000
    - TZ=${TZ:-UTC}
    - CONF_THRESHOLD=0.2
    - NMS_IOU_THRESHOLD=0.4
    - DETECTION_INTERVAL=0.2
    - STABLE_FRAMES_REQUIRED=3
    - GRACE_FRAMES=5
    - MIN_TIME_BETWEEN_EVENTS=5.0
    - CLAHE_CLIP_LIMIT=2.0
    - CLAHE_TILE_GRID_SIZE=8
    - CALIBRATION_ENABLED=true
    - CALIBRATION_RANGE_MIN=0.5
    - CALIBRATION_RANGE_MAX=0.6
    - STORAGE_ROOT=/media/frigate/clips/
    - PRE_EVENT_BUFFER_SECONDS=5
    - POST_EVENT_BUFFER_SECONDS=5
    - VIDEO_FPS=5
    - VIDEO_BUFFER_SECONDS=15
    - EVENTS_DB=${DB_NAME}
    - DB_HOST=postgres
    - DB_USER=${DB_USERNAME}
    - DB_PASSWORD=${DB_PASSWORD}
    - DB_PORT=5432
    - MQTT_ENABLED=true
    - BROKER_HOST=emqx
    - BROKER_PORT=1883
    - MQTT_USERNAME=ai_controller
    - MQTT_PASSWORD=${MQTT_AI_CONTROLLER_PASSWORD}
    - MQTT_HASS_USERNAME=hass
    - MQTT_HASS_PASSWORD=${MQTT_HASS_PASSWORD}
    - PROXIMITY_DETECTION_ENABLED=true
    - EMS_PROXIMITY_THRESHOLD=0.8
    - EMS_CONFIDENCE_THRESHOLD=0.6
    - EMS_ALPHA=0.3
    - CAMERA_FOV_HORIZONTAL=62.2
    - CAMERA_DISTANCE_METERS=2.5
    - UNKNOWN_FACE_ALARM_ENABLED=true
    - ALARM_COOLDOWN_SECONDS=3.0
    - PROXIMITY_DEBUG_ENABLED=true
    - LOG_LEVEL=INFO
    volumes:
    - ./frigate/config:/config:rw
    - ./frigate/storage:/media/frigate:rw
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    - ./pilot_parcel_theft_AI/models:/usr/src/app/models:ro
    - ./pilot_parcel_theft_AI/constants.py:/usr/src/app/constants.py:ro
    - /dev/shm:/dev/shm
    - /usr/lib/librknnrt.so:/usr/lib/librknnrt.so:ro
    - /usr/lib/aarch64-linux-gnu/librknn_api.so:/usr/lib/aarch64-linux-gnu/librknn_api.so:ro
    - /usr/lib/aarch64-linux-gnu/librknn_api.so.2.3.0:/usr/lib/aarch64-linux-gnu/librknn_api.so.2.3.0:ro
    - /usr/lib/aarch64-linux-gnu/librknnrt.so:/usr/lib/aarch64-linux-gnu/librknnrt.so:ro
    - /usr/lib/aarch64-linux-gnu/librknnrt.so.2.3.0:/usr/lib/aarch64-linux-gnu/librknnrt.so.2.3.0:ro
    links:
    - frigate
    - emqx
    - postgres
    depends_on:
      emqx:
        condition: service_healthy
      frigate:
        condition: service_started
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 128M
  audio_server:
    container_name: audio_server
    hostname: audio_server
    image: ${IMAGE_AUDIO_SERVER:-jupytertemi/audio_server:dev}
    pull_policy: never
    restart: always
    ports:
    - 5555:5555
    volumes:
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    environment:
    - TZ=${TZ:-UTC}
  transfer_server:
    container_name: transfer_server
    hostname: transfer_server
    image: ${IMAGE_TRANSFER_SERVER:-jupytertemi/transfer_server:dev}
    pull_policy: never
    restart: always
    ports:
    - 4444:4444
    - 4445:4445
    volumes:
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    - ./transfer_server/transfer_sensor_mac_optimize.py:/usr/src/app/transfer_sensor_mac_optimize.py:ro
    environment:
    - TZ=${TZ:-UTC}

  video_server:
    image: ${IMAGE_VIDEO_SERVER:-nginx:latest}
    pull_policy: never
    container_name: video_server
    ports:
    - 9000:80
    volumes:
    - /etc/localtime:/etc/localtime:ro
    - ./frigate/config:/config
    - ./frigate/storage:/media/frigate
    - ./video-server/nginx.conf:/etc/nginx/nginx.conf:ro
    - /etc/timezone:/etc/timezone:ro
    depends_on:
    - frigate
    links:
    - frigate
    restart: always
    environment:
    - TZ=${TZ:-UTC}
  ring_mqtt:
    container_name: ring_mqtt
    image: ${IMAGE_RING_MQTT:-tsightler/ring-mqtt:latest}
    pull_policy: never
    ports:
    - 8554:8554
    environment:
      TZ: ${TZ:-UTC}
    volumes:
    - ./ring-mqtt-data:/data
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
  ring-webrtc:
    image: ${IMAGE_RING_WEBRTC:-jupytertemi/ring-client:dev}
    pull_policy: never
    container_name: ring-webrtc
    ports:
    - 3000:3000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    volumes:
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    - /usr/share/zoneinfo:/usr/share/zoneinfo:ro
    environment:
    - TZ=${TZ:-UTC}
  haproxy-service:
    container_name: haproxy-service
    image: ${IMAGE_HAPROXY:-jupytertemi/haproxy:1.0.1}
    pull_policy: never
    hostname: haproxy
    volumes:
    - ./haproxy/configs/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    - ./haproxy/pem/pubkey.pem:/usr/local/etc/haproxy/pem/pubkey.pem
    - ./haproxy/certs:/etc/ssl/certs
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    - /usr/share/zoneinfo:/usr/share/zoneinfo:ro
    restart: on-failure
    environment:
    - HUB_BASIC_AUTH=${HUB_BASIC_AUTH}
    - TZ=${TZ:-UTC}
    - HUB_USER_ID=${HUB_USER_ID}
    - FRIGATE_PASSWORD=${FRIGATE_PASSWORD}
    extra_hosts:
    - host.docker.internal:host-gateway
    ports:
    - 80:80
    - 19840:19840
  node-exporter:
    image: prom/node-exporter:latest
    pull_policy: never
    container_name: node-exporter
    ports:
    - 9100:9100
    command:
    - --path.rootfs=/host
    - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
    - /:/host:ro,rslave
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    environment:
    - TZ=${TZ:-UTC}
  clip_transcoder:
    container_name: clip_transcoder
    hostname: clip_transcoder
    image: ${IMAGE_CLIP_TRANSCODER:-jupytertemi/clip_transcoder:dev}
    pull_policy: never
    healthcheck:
      test:
      - NONE
    restart: unless-stopped
    privileged: true
    security_opt:
    - apparmor=unconfined
    - systempaths=unconfined
    devices:
    - /dev/dri
    - /dev/dma_heap
    - /dev/rga
    - /dev/mpp_service
    volumes:
    - ./frigate/storage:/media/frigate:rw
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    environment:
    - CLIPS_DIR=${CLIPS_DIR:-/media/frigate/clips}
    - TZ=${TZ:-UTC}
    - FFMPEG_BIN=${FFMPEG_BIN:-/usr/lib/ffmpeg/7.0/bin/ffmpeg}
    - FFPROBE_BIN=${FFPROBE_BIN:-/usr/lib/ffmpeg/7.0/bin/ffprobe}
    - VIDEO_ENCODER=${VIDEO_ENCODER:-h264_rkmpp}
    - TARGET_BITRATE=${TARGET_BITRATE:-4M}
    - MIN_FILE_AGE_SECONDS=${MIN_FILE_AGE_SECONDS:-1}
    - TRANSCODE_TIMEOUT_SECONDS=${TRANSCODE_TIMEOUT_SECONDS:-300}
    - STARTUP_SWEEP_LIMIT=${STARTUP_SWEEP_LIMIT:-25}
    - LOG_LEVEL=${LOG_LEVEL:-INFO}
    deploy:
      resources:
        limits:
          memory: 384M
        reservations:
          memory: 128M
volumes:
  postgres-vlm: null
  redis_data: null
  hass-vlm: null
