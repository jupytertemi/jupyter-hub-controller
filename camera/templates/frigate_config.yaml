mqtt:
  enabled: true
  host: 'emqx'
  user: {{mqtt_user}}
  password: {{mqtt_password}}

model:
  path: deci-fp16-yolonas_s
  width: 320
  height: 320
  input_pixel_format: bgr
  input_tensor: nhwc

detectors:
  rknn:
    type: rknn
    core_mask: 0b111
    num_cores: 3

ffmpeg:
  path: "7.0"
  hwaccel_args: preset-rkmpp
  input_args: preset-rtsp-restream -fflags +genpts+igndts
  retry_interval: 10

go2rtc:
  ffmpeg:
    bin: /config/ffmpeg-go2rtc
  streams:{% if not cameras %} {}{% endif %}
{% for camera in cameras %}{% if camera.type == "RING" %}    {{ camera.name }}:
      - rtsp://ring_mqtt:8554/{{ camera.ring_device_id }}_live
{% else %}    {{ camera.name }}:
      - {{ camera.rtsp_url }}
    {{ camera.name }}-sub:
      - {{ camera.sub_rtsp_url|default:camera.rtsp_url }}
    {{ camera.name }}-live:
      - {{ camera.sub_rtsp_url|default:camera.rtsp_url }}#video
      - "ffmpeg:{{ camera.name }}-sub#video=h264#hardware=rkmpp#width=1280#height=720#raw=-r 10 -g 20"
{% endif %}{% endfor %}
  webrtc:
    candidates:
      - stun:8555
{% if turn_server %}    ice_servers:
{% for turn_url in turn_server %}      - urls:
          - {{ turn_url }}
        username: {{ turn_user }}
        credential: {{ turn_password }}
{% endfor %}{% endif %}

logger:
  default: info
  logs:
    frigate.ffmpeg: warning

cameras:{% if not cameras %} {}{% endif %}
{% for camera in cameras %}
  {{ camera.name }}:
    enabled: true
    ffmpeg:
      inputs:
{% if camera.type == "RING" %}
        - path: rtsp://ring_mqtt:8554/{{ camera.ring_device_id }}_live
          roles:
            - detect
            - record
          input_args:
            - -fflags
            - +genpts
            - -rtsp_transport
            - tcp
            - -timeout
            - "30000000"
      retry_interval: 5
      output_args:
        record: -f segment -segment_time 10 -segment_format mp4 -reset_timestamps 1 -strftime 1 -c:v copy -c:a aac
{% else %}{% if camera.has_vehicle_detection and camera.detect_width and camera.detect_height %}
        - path: rtsp://127.0.0.1:8554/{{ camera.name }}
          roles:
            - detect
            - record
          input_args:
            - -fflags
            - +genpts+igndts
            - -rtsp_transport
            - tcp
{% else %}
        - path: rtsp://127.0.0.1:8554/{{ camera.name }}-sub
          roles:
            - detect
          input_args:
            - -fflags
            - +genpts+igndts
            - -rtsp_transport
            - tcp
        - path: rtsp://127.0.0.1:8554/{{ camera.name }}
          roles:
            - record
          input_args:
            - -fflags
            - +genpts+igndts
            - -rtsp_transport
            - tcp
{% endif %}{% endif %}

    detect:
      enabled: true
{% if camera.type == "RING" %}      width: 720
      height: 720
{% elif camera.has_vehicle_detection and camera.detect_width and camera.detect_height %}      width: {{ camera.detect_width }}
      height: {{ camera.detect_height }}
{% elif camera.sub_stream_width and camera.sub_stream_height %}      width: {{ camera.sub_stream_width }}
      height: {{ camera.sub_stream_height }}
{% else %}      width: 1920
      height: 1080
{% endif %}{% if camera.has_vehicle_detection %}      fps: 10
{% else %}      fps: {{ camera.motion_settings.detect.fps }}
{% endif %}
      max_disappeared: {{ camera.motion_settings.detect.max_disappeared }}
      stationary:
        interval: {{ camera.motion_settings.detect.stationary.interval }}
        threshold: {{ camera.motion_settings.detect.stationary.threshold }}{% if camera.motion_settings.detect.stationary.max_frames %}
        max_frames:
          default: {{ camera.motion_settings.detect.stationary.max_frames }}{% endif %}

    record:
      enabled: true
      retain:
        days: 0
        mode: motion

    snapshots:
      enabled: true
      timestamp: false
      # Disabled — burned-in bounding-box overlay was being detected by
      # the plate detector as a fake "license plate" on event-snapshot
      # fetches and producing high-confidence false positives (CCT-S OCR
      # returned "7D2235" from the rendered "car: 70% 22659" label). The
      # clean_copy below still saves a parallel annotated image for debug.
      bounding_box: false
      clean_copy: true
      retain:
        default: 30

    # MotionIQ profile: {{ camera.motion_iq_profile }}
    # (vehicle cameras force-render the AWARE baseline regardless of
    # stored profile — see Camera.motion_settings)
    motion:
      threshold: {{ camera.motion_settings.motion.threshold }}
      contour_area: {{ camera.motion_settings.motion.contour_area }}
      frame_alpha: {{ camera.motion_settings.motion.frame_alpha }}
      frame_height: {{ camera.motion_settings.motion.frame_height }}
      improve_contrast: {{ camera.motion_settings.motion.improve_contrast|lower }}
      lightning_threshold: {{ camera.motion_settings.motion.lightning_threshold }}
      mqtt_off_delay: {{ camera.motion_settings.motion.mqtt_off_delay }}

    mqtt:
      bounding_box: true
      crop: true
      height: 720
      quality: 100
      timestamp: true

    objects:
      filters:
        person:
          min_score: {{ camera.motion_settings.objects.person.min_score }}
          threshold: {{ camera.motion_settings.objects.person.threshold }}
          min_area: {{ camera.motion_settings.objects.person.min_area }}
        car:
          min_score: {{ camera.motion_settings.objects.car.min_score }}
          threshold: {{ camera.motion_settings.objects.car.threshold }}
          min_area: {{ camera.motion_settings.objects.car.min_area }}
      # Limited to classes the loaded RKNN object detector produces.
      # Adding truck/bus/motorcycle here logs "not supported by the current
      # model" and Frigate silently drops them. If the detector ever swaps
      # to a model with those classes, expand this list.
      track:
        - person
        - car

    review:
      alerts:
        labels:{% for lbl in camera.motion_settings.review.alerts_labels %}
          - {{ lbl }}{% endfor %}
      detections:
        labels:{% for lbl in camera.motion_settings.review.detections_labels %}
          - {{ lbl }}{% endfor %}
{% if camera.zones %}
    zones:
{% for zone in camera.zones %}
      {{ zone.name }}:
        coordinates: {{ zone.coordinates }}
        inertia: 3
        loitering_time: 0
        objects:
{% for obj in zone.objects %}
          - {{ obj }}
{% endfor %}
{% endfor %}
{% endif %}
{% endfor %}

version: "0.17-0"
