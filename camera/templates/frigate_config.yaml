mqtt:
  enabled: true
  host: 'emqx'
  user: {{mqtt_user}}
  password: {{mqtt_password}}

model:
  path: deci-fp16-yolonas_s
  width: 320
  height: 320
  input_pixel_format: bgr
  input_tensor: nhwc

detectors:
  rknn:
    type: rknn
    core_mask: 0b111
    num_cores: 3

ffmpeg:
  path: "7.0"
  hwaccel_args: preset-rkmpp
  input_args: preset-rtsp-restream -fflags +genpts+igndts
  retry_interval: 10

go2rtc:
  ffmpeg:
    bin: /config/ffmpeg-go2rtc
  streams:{% if not cameras %} {}{% endif %}
{% for camera in cameras %}{% if camera.type == "RING" %}    {{ camera.name }}:
      - rtsp://ring-mqtt:8554/{{ camera.ring_device_id }}_live
{% else %}    {{ camera.name }}:
      - {{ camera.rtsp_url }}
    {{ camera.name }}-sub:
      - {{ camera.sub_rtsp_url|default:camera.rtsp_url }}
    {{ camera.name }}-live:
      - {{ camera.sub_rtsp_url|default:camera.rtsp_url }}
      - "ffmpeg:{{ camera.name }}-sub#video=h264#hardware=rkmpp#width=1280#height=720#raw=-r 10 -g 20"
{% endif %}{% endfor %}
  webrtc:
    candidates:
      - stun:8555
{% if turn_server %}    ice_servers:
{% for turn_url in turn_server %}      - urls:
          - {{ turn_url }}
        username: {{ turn_user }}
        credential: {{ turn_password }}
{% endfor %}{% endif %}

logger:
  default: info
  logs:
    frigate.ffmpeg: warning

cameras:{% if not cameras %} {}{% endif %}
{% for camera in cameras %}
  {{ camera.name }}:
    enabled: true
    ffmpeg:
      inputs:
{% if camera.type == "RING" %}
        - path: rtsp://ring-mqtt:8554/{{ camera.ring_device_id }}_live
          roles:
            - detect
            - record
          input_args:
            - -fflags
            - +genpts
            - -rtsp_transport
            - tcp
            - -timeout
            - "30000000"
      retry_interval: 5
      output_args:
        record: -f segment -segment_time 10 -segment_format mp4 -reset_timestamps 1 -strftime 1 -c:v copy -c:a aac
{% else %}
        - path: rtsp://127.0.0.1:8554/{{ camera.name }}-sub
          roles:
            - detect
          input_args:
            - -fflags
            - +genpts+igndts
            - -rtsp_transport
            - tcp
        - path: rtsp://127.0.0.1:8554/{{ camera.name }}
          roles:
            - record
          input_args:
            - -fflags
            - +genpts+igndts
            - -rtsp_transport
            - tcp
{% endif %}

    detect:
      enabled: true
{% if camera.type == "RING" %}      width: 720
      height: 720
{% else %}      width: 640
      height: 480
{% endif %}      fps: 5
      max_disappeared: 50
      stationary:
        interval: 50
        threshold: 50

    record:
      enabled: true
      retain:
        days: 0
        mode: motion
      alerts:
        retain:
          days: 30
      detections:
        retain:
          days: 30

    snapshots:
      enabled: true
      timestamp: false
      bounding_box: true
      clean_copy: true
      retain:
        default: 30

    motion:
      threshold: 35
      contour_area: 30
      frame_alpha: 0.02
      frame_height: 100
      improve_contrast: true
      mqtt_off_delay: 30

    mqtt:
      bounding_box: true
      crop: true
      height: 500
      quality: 100
      timestamp: true

    objects:
      filters:
        person:
          min_score: 0.55
          threshold: 0.7
          min_area: 1500
        car:
          min_score: 0.65
          threshold: 0.7
      track:
        - person
        - car
        - motorcycle
        - truck
        - bus
{% if camera.zones %}
    zones:
{% for zone in camera.zones %}
      {{ zone.name }}:
        coordinates: {{ zone.coordinates }}
        inertia: 3
        loitering_time: 0
        objects:
{% for obj in zone.objects %}
          - {{ obj }}
{% endfor %}
{% endfor %}
{% endif %}
{% endfor %}

version: "0.17-0"
